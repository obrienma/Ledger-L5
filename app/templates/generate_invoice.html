{% extends "base.html" %}
{% block title %}Generate Invoice — Ledger-L5{% endblock %}
{% block content %}
<h1>Generate Invoice</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/dashboard/generate-invoice">
  <label for="customer_id">Customer</label><br>
  <select id="customer_id" name="customer_id" required>
    {% for customer in customers %}
    <option value="{{ customer.id }}">{{ customer.name }} ({{ customer.id }})</option>
    {% endfor %}
  </select>
  <br><br>
  <label>Period start (optional — defaults to previous calendar month)
    <input type="date" name="period_start">
  </label>
  <br>
  <label>Period end (optional — defaults to previous calendar month)
    <input type="date" name="period_end">
  </label>
  <br><br>
  <button type="submit">Generate</button>
</form>
{% endblock %}
