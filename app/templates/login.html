<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ledger-L5 — Login</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; margin-top: 4rem; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <div>
    <h1>Ledger-L5</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/login">
      <label for="token">Operator Token</label><br>
      <input type="password" id="token" name="token" required autofocus>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
